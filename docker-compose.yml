services:
  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      fastapi:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/finrizika_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_DEV_MODE: "false"
      FASTAPI_URL: ${FASTAPI_URL}
    networks:
      - finrizika_network
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./uploads:/app/uploads
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: finrizika_db
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - finrizika_network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fastapi:
    build: ./fastapi
    networks:
      - finrizika_network
    ports:
      - "8081:8081"
    depends_on:
      ollama:
        condition: service_healthy  # wait for healthcheck to pass
    environment:
      - OLLAMA_HOST=http://ollama:11434

  ollama:
    image: ollama/ollama
    entrypoint: "/bin/sh -c 'ollama serve & SERVE_PID=$$! && until ollama list >/dev/null 2>&1; do sleep 1; done && (ollama list | grep -q llama3.2 || ollama pull llama3.2) && wait $$SERVE_PID'"
    networks:
      - finrizika_network
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s  # enough time to pull the model on first run

volumes:
  ollama_data:
  mariadb_data:

networks:
  finrizika_network:
    driver: bridge
